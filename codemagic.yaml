workflows:
  ios-workflow:
    name: Glosseti iOS
    max_build_duration: 120

    environment:
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        BUNDLE_ID: com.glosseti.app
        APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID
        APP_STORE_CONNECT_KEY_IDENTIFIER: $APP_STORE_CONNECT_KEY_IDENTIFIER
        APP_STORE_CONNECT_PRIVATE_KEY: $APP_STORE_CONNECT_PRIVATE_KEY
      node: 22
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Patch apple-sign-in for capacitor-swift-pm 8.x
        script: |
          PKG_SWIFT="node_modules/@capacitor-community/apple-sign-in/Package.swift"
          if [ -f "$PKG_SWIFT" ]; then
            echo "🔧 Patching $PKG_SWIFT to allow capacitor-swift-pm 8.x"
            sed -i.bak 's|from: "7.0.0"|"8.0.0" ..< "9.0.0"|g' "$PKG_SWIFT"
            echo "--- Patched Package.swift ---"
            cat "$PKG_SWIFT"
          else
            echo "⚠️  $PKG_SWIFT not found — skipping patch."
          fi

      - name: Build web app
        script: npm run build

      - name: Add iOS platform if missing
        script: |
          if [ ! -d "ios/App" ]; then
            echo "📱 No iOS platform found — adding it now..."
            npx cap add ios
          else
            echo "✅ iOS platform already exists, skipping cap add."
          fi

      - name: Sync Capacitor iOS
        script: npx cap sync ios

      - name: Inject iOS permission strings into Info.plist
        script: |
          PLIST=ios/App/App/Info.plist

          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Glosseti uses the camera so you can take a selfie or full-body photo for AI styling.'" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'Glosseti uses the camera so you can take a selfie or full-body photo for AI styling.'" "$PLIST"

          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Glosseti needs access to your photos so you can pick an existing selfie or outfit photo for AI styling.'" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'Glosseti needs access to your photos so you can pick an existing selfie or outfit photo for AI styling.'" "$PLIST"

          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'Glosseti saves your generated styled looks to your Photos so you can keep or share them.'" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryAddUsageDescription 'Glosseti saves your generated styled looks to your Photos so you can keep or share them.'" "$PLIST"

          echo "✅ Info.plist permission strings injected."

      - name: Resolve Swift Package Manager dependencies
        script: |
          if [ ! -d "$XCODE_PROJECT" ]; then
            echo "❌ ERROR: Xcode project not found at $XCODE_PROJECT"
            ls -la ios/App || echo "ios/App does not exist"
            exit 1
          fi

          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"

      - name: Fetch iOS signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Build iOS app
        script: |
          xcodebuild -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -archivePath build/ios/xcarchive/App.xcarchive \
            -configuration Release \
            archive \
            DEVELOPMENT_TEAM=N8LPSBH923 \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --archive-xcarchive build/ios/xcarchive/App.xcarchive

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

  android-workflow:
    name: Glosseti Android
    max_build_duration: 120

    environment:
      vars:
        PACKAGE_NAME: com.glosseti.app
      node: 22
      java: 21

    scripts:
      - name: Install dependencies
        script: npm install

      - name: Run frontend tests
        script: |
          if npm run | grep -qE '^\s+test'; then
            npm test -- --run || npx vitest run
          else
            echo "ℹ️  No test script found — skipping tests."
          fi

      - name: Build web app
        script: npm run build

      - name: Add Android platform if missing
        script: |
          if [ ! -d "android" ] || [ ! -f "android/build.gradle" ]; then
            echo "🤖 No Android platform found — adding it now..."
            rm -rf android
            npx cap add android
          else
            echo "✅ Android platform already exists, skipping cap add."
          fi

      - name: Sync Capacitor Android
        script: npx cap sync android

      - name: Make gradlew executable
        script: chmod +x android/gradlew

      - name: Build Android AAB release
        script: |
          cd android
          ./gradlew :app:bundleRelease

      - name: Build Android APK release
        script: |
          cd android
          ./gradlew :app:assembleRelease

    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
      
