workflows:
  ios-workflow:
    name: Glosseti iOS
    max_build_duration: 120
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.glosseti.app
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Add iOS platform (if missing)
        script: |
          if [ ! -d "ios/App" ]; then
            echo "📱 No iOS platform found — adding it now..."
            npx cap add ios
          else
            echo "✅ iOS platform already exists, skipping 'cap add'."
          fi
      - name: Sync Capacitor (iOS)
        script: npx cap sync ios
      - name: Inject iOS permission strings into Info.plist
        script: |
          PLIST=ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Glosseti uses the camera so you can take a selfie or full-body photo for AI styling.'" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'Glosseti uses the camera so you can take a selfie or full-body photo for AI styling.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'Glosseti needs access to your photos so you can pick an existing selfie or outfit photo for AI styling.'" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 'Glosseti needs access to your photos so you can pick an existing selfie or outfit photo for AI styling.'" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 'Glosseti saves your generated styled looks to your Photos so you can keep or share them.'" "$PLIST" 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryAddUsageDescription 'Glosseti saves your generated styled looks to your Photos so you can keep or share them.'" "$PLIST"
          echo "✅ Info.plist permission strings injected:"
          /usr/libexec/PlistBuddy -c "Print :NSCameraUsageDescription" "$PLIST"
          /usr/libexec/PlistBuddy -c "Print :NSPhotoLibraryUsageDescription" "$PLIST"
          /usr/libexec/PlistBuddy -c "Print :NSPhotoLibraryAddUsageDescription" "$PLIST"
      - name: Verify iOS dependencies
        script: |
          if [ ! -d "ios/App" ]; then
            echo "⚠️  iOS platform missing — generating native project..."
            rm -rf ios
            npx cap add ios
            npx cap sync ios
          fi
          if [ -f "ios/App/Podfile" ]; then
            echo "📄 Podfile found at ios/App/Podfile — running pod install"
            (cd ios/App && pod install --repo-update)
          else
            echo "✅ No Podfile generated; Capacitor is using Swift Package Manager, so CocoaPods install is not required."
          fi
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa

  android-workflow:
    name: Glosseti Android
    max_build_duration: 120
    environment:
      vars:
        PACKAGE_NAME: com.glosseti.app
      node: 22
      java: 21
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Run frontend tests
        script: |
          if npm run | grep -qE '^\s+test'; then
            npm test -- --run || npx vitest run
          else
            echo "ℹ️  No 'test' script found — skipping tests."
          fi
      - name: Build web app
        script: npm run build
      - name: Add Android platform (if missing)
        script: |
          if [ ! -d "android" ] || [ ! -f "android/build.gradle" ]; then
            echo "🤖 No Android platform found — adding it now..."
            rm -rf android
            npx cap add android
          else
            echo "✅ Android platform already exists, skipping 'cap add'."
          fi
      - name: Sync Capacitor (Android)
        script: npx cap sync android
      - name: Make gradlew executable
        script: chmod +x android/gradlew
      - name: Build Android AAB (release)
        script: |
          cd android
          ./gradlew :app:bundleRelease
      - name: Build Android APK (release)
        script: |
          cd android
          ./gradlew :app:assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk

integrations:
  app_store_connect: App Store Connect

publishing:
  app_store_connect:
    auth: integration
    submit_to_testflight: true
    submit_to_app_store: false
