workflows:
  ios-workflow:
    name: Glosseti iOS
    max_build_duration: 120
    integrations:
      app_store_connect: Codemagic admin
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.glosseti.app
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
      node: 18
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Increment build number
        script: |
          cd ios/App
          agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  android-workflow:
    name: Glosseti Android
    max_build_duration: 120
    environment:
      android_signing:
        - Glosseti - keystore
      node: 22
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web assets
        script: npm run build
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Build Android
        script: |
          cd android
          export JAVA_HOME=$(/usr/libexec/java_home -v 17) 2>/dev/null || export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab          
