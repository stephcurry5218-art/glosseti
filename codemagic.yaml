workflows:
  ios-workflow:
    name: Glosseti iOS
    max_build_duration: 120

    environment:
      groups:
        - app_store_connect
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.glosseti.app
      vars:
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        BUNDLE_ID: com.glosseti.app
        DEVELOPMENT_TEAM: N8LPSBH923
      node: 22
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: |
          set -e
          npm install

      - name: Patch apple-sign-in for capacitor-swift-pm 8.x
        script: |
          set -e
          PKG_SWIFT="node_modules/@capacitor-community/apple-sign-in/Package.swift"
          if [ -f "$PKG_SWIFT" ]; then
            python3 - "$PKG_SWIFT" <<'PY'
          from pathlib import Path
          import sys

          path = Path(sys.argv[1])
          text = path.read_text()
          text = text.replace('from: "7.0.0"', '"8.0.0" ..< "9.0.0"')
          path.write_text(text)
          PY
            echo "Patched $PKG_SWIFT"
            cat "$PKG_SWIFT"
          else
            echo "$PKG_SWIFT not found; skipping patch."
          fi

      - name: Build web app
        script: |
          set -e
          npm run build

      - name: Add iOS platform if missing
        script: |
          set -e
          if [ ! -d "ios/App" ]; then
            npx cap add ios
          else
            echo "iOS platform already exists."
          fi

      - name: Sync Capacitor iOS
        script: |
          set -e
          npx cap sync ios

      - name: Inject iOS permission strings into Info.plist
        script: |
          set -e
          PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string Glosseti uses the camera so you can take a selfie or full-body photo for AI styling." "$PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription Glosseti uses the camera so you can take a selfie or full-body photo for AI styling." "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string Glosseti needs access to your photos so you can pick an existing selfie or outfit photo for AI styling." "$PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription Glosseti needs access to your photos so you can pick an existing selfie or outfit photo for AI styling." "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string Glosseti saves your generated styled looks to your Photos so you can keep or share them." "$PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryAddUsageDescription Glosseti saves your generated styled looks to your Photos so you can keep or share them." "$PLIST"

      - name: Clean Swift Package Manager state
        script: |
          set -e
          rm -rf "$HOME/Library/Caches/org.swift.swiftpm"
          rm -rf "$HOME/Library/org.swift.swiftpm"
          rm -rf "$HOME/Library/Developer/Xcode/DerivedData"
          rm -rf "$CM_BUILD_DIR/spm-clones"
          rm -rf "$CM_BUILD_DIR/DerivedData"
          rm -rf "ios/App/App.xcodeproj/project.xcworkspace/xcshareddata/swiftpm"
          rm -rf "ios/App/App.xcworkspace/xcshareddata/swiftpm"
          mkdir -p "$CM_BUILD_DIR/spm-clones"
          mkdir -p "$CM_BUILD_DIR/DerivedData"

      - name: Resolve Swift Package Manager dependencies
        script: |
          set -e
          if [ ! -d "$XCODE_PROJECT" ]; then
            echo "Xcode project not found at $XCODE_PROJECT"
            ls -la ios/App || true
            exit 1
          fi

          set +e
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -clonedSourcePackagesDirPath "$CM_BUILD_DIR/spm-clones" \
            -derivedDataPath "$CM_BUILD_DIR/DerivedData" \
            -disablePackageRepositoryCache
          STATUS=$?
          set -e

          if [ "$STATUS" -ne 0 ]; then
            rm -rf "$HOME/Library/Caches/org.swift.swiftpm"
            rm -rf "$HOME/Library/org.swift.swiftpm"
            rm -rf "$CM_BUILD_DIR/spm-clones"
            rm -rf "$CM_BUILD_DIR/DerivedData"
            mkdir -p "$CM_BUILD_DIR/spm-clones"
            mkdir -p "$CM_BUILD_DIR/DerivedData"
            xcodebuild -resolvePackageDependencies \
              -project "$XCODE_PROJECT" \
              -scheme "$XCODE_SCHEME" \
              -clonedSourcePackagesDirPath "$CM_BUILD_DIR/spm-clones" \
              -derivedDataPath "$CM_BUILD_DIR/DerivedData" \
              -disablePackageRepositoryCache
          fi

      - name: Set up code signing
        script: |
          set -e
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Build iOS archive
        script: |
          set -e
          xcode-project use-profiles
          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -archivePath build/ios/xcarchive/App.xcarchive \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -clonedSourcePackagesDirPath "$CM_BUILD_DIR/spm-clones" \
            -derivedDataPath "$CM_BUILD_DIR/DerivedData" \
            -disablePackageRepositoryCache \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Export IPA
        script: |
          set -e
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --archive-xcarchive build/ios/xcarchive/App.xcarchive

    artifacts:
      - "build/ios/ipa/*.ipa"
      - "/tmp/xcodebuild_logs/*.log"
      - "$HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app"
      - "$HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM"

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false
        
